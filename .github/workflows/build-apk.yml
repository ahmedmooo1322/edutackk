name: Build EduTrack APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android
        uses: android-actions/setup-android@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Android SDK 35
        run: |
          sdkmanager --install "platforms;android-35"
          sdkmanager --install "build-tools;35.0.0"
          yes | sdkmanager --licenses || true

      - name: Create Flutter project
        run: flutter create edutrack_app

      - name: Copy app source
        run: cp -R app_src/. edutrack_app/

      - name: Force compile SDK 35
        run: sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 35/g' edutrack_app/android/app/build.gradle.kts

      - name: Force target SDK 35
        run: sed -i 's/targetSdk = flutter.targetSdkVersion/targetSdk = 35/g' edutrack_app/android/app/build.gradle.kts

      - name: Get packages
        working-directory: edutrack_app
        run: flutter pub get

      - name: Build APK
        working-directory: edutrack_app
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: edutrack-debug-apk
          path: edutrack_app/build/app/outputs/flutter-apk/app-debug.apk

name: Build EduTrack APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Show files
        run: ls -la

      - name: Create Flutter project
        run: flutter create edutrack_app

      - name: Copy app source
        run: cp -a app_src/. edutrack_app/

      - name: Get packages
        working-directory: edutrack_app
        run: flutter pub get

      - name: Build APK
        working-directory: edutrack_app
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: edutrack-debug-apk
          path: edutrack_app/build/app/outputs/flutter-apk/app-debug.apk

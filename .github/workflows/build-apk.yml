name: Build EduTrack APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android
        uses: android-actions/setup-android@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Android SDK 36
        run: |
          sdkmanager --install "platforms;android-36"
          sdkmanager --install "build-tools;36.0.0"
          yes | sdkmanager --licenses || true

      - name: Create Flutter project
        run: flutter create edutrack_app

      - name: Copy app source
        run: cp -R app_src/. edutrack_app/

      - name: Patch Android SDK versions
        run: |
          python3 -c "from pathlib import Path; import re; files=[Path('edutrack_app/android/app/build.gradle.kts'),Path('edutrack_app/android/app/build.gradle')]; [f.write_text(re.sub(r'compileSdk\\s*=\\s*[^\\n]+','compileSdk = 36', re.sub(r'targetSdk\\s*=\\s*[^\\n]+','targetSdk = 36', re.sub(r'compileSdkVersion\\s+[^\\n]+','compileSdkVersion 36', re.sub(r'targetSdkVersion\\s+[^\\n]+','targetSdkVersion 36', f.read_text()))))) for f in files if f.exists()]"
          echo "----- build.gradle.kts -----"
          cat edutrack_app/android/app/build.gradle.kts || true
          echo "----- build.gradle -----"
          cat edutrack_app/android/app/build.gradle || true

      - name: Get packages
        working-directory: edutrack_app
        run: flutter pub get

      - name: Build APK
        working-directory: edutrack_app
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: edutrack-debug-apk
          path: edutrack_app/build/app/outputs/flutter-apk/app-debug.apk

name: Build EduTrack APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Android SDK 35
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Create Flutter project
        run: flutter create edutrack_app

      - name: Copy app source
        run: cp -R app_src/. edutrack_app/

      - name: Force compile SDK 35
        run: |
          python3 - <<'PY'
          from pathlib import Path

          files = [
              Path("edutrack_app/android/app/build.gradle"),
              Path("edutrack_app/android/app/build.gradle.kts"),
          ]

          for file in files:
              if not file.exists():
                  continue

              text = file.read_text()

              text = text.replace("compileSdk = flutter.compileSdkVersion", "compileSdk = 35")
              text = text.replace("targetSdk = flutter.targetSdkVersion", "targetSdk = 35")
              text = text.replace("compileSdkVersion flutter.compileSdkVersion", "compileSdkVersion 35")
              text = text.replace("targetSdkVersion flutter.targetSdkVersion", "targetSdkVersion 35")

              file.write_text(text)
          PY

      - name: Get packages
        working-directory: edutrack_app
        run: flutter pub get

      - name: Build APK
        working-directory: edutrack_app
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: edutrack-debug-apk
          path: edutrack_app/build/app/outputs/flutter-apk/app-debug.apk
      - name: Create Flutter project
        run: flutter create edutrack_app

      - name: Copy app source
        run: cp -a app_src/. edutrack_app/

      - name: Force Android compile SDK 35
        run: |
          if [ -f edutrack_app/android/app/build.gradle.kts ]; then
            perl -0pi -e 's/compileSdk\s*=\s*\d+/compileSdk = 35/g' edutrack_app/android/app/build.gradle.kts
            perl -0pi -e 's/targetSdk\s*=\s*\d+/targetSdk = 35/g' edutrack_app/android/app/build.gradle.kts
          fi

          if [ -f edutrack_app/android/app/build.gradle ]; then
            sed -i 's/compileSdkVersion [0-9][0-9]*/compileSdkVersion 35/g' edutrack_app/android/app/build.gradle
            sed -i 's/targetSdkVersion [0-9][0-9]*/targetSdkVersion 35/g' edutrack_app/android/app/build.gradle
            sed -i 's/compileSdk [0-9][0-9]*/compileSdk 35/g' edutrack_app/android/app/build.gradle
            sed -i 's/targetSdk [0-9][0-9]*/targetSdk 35/g' edutrack_app/android/app/build.gradle
          fi

      - name: Get packages
        working-directory: edutrack_app
        run: flutter pub get

      - name: Build APK
        working-directory: edutrack_app
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: edutrack-debug-apk
          path: edutrack_app/build/app/outputs/flutter-apk/app-debug.apk        working-directory: edutrack_app
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: edutrack-debug-apk
          path: edutrack_app/build/app/outputs/flutter-apk/app-debug.apk

name: Build Signed EduTrack APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-android:
    name: Build signed Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Validate signing secrets
        run: |
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "Missing secret: ANDROID_KEYSTORE_BASE64"
            exit 1
          fi

          if [ -z "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ]; then
            echo "Missing secret: ANDROID_KEYSTORE_PASSWORD"
            exit 1
          fi

          if [ -z "${{ secrets.ANDROID_KEY_ALIAS }}" ]; then
            echo "Missing secret: ANDROID_KEY_ALIAS"
            exit 1
          fi

          if [ -z "${{ secrets.ANDROID_KEY_PASSWORD }}" ]; then
            echo "Missing secret: ANDROID_KEY_PASSWORD"
            exit 1
          fi

          echo "Signing secrets found."

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Restore Android keystore
        run: |
          mkdir -p android/app
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | tr -d '\n' | base64 --decode > android/app/edutrack-release-key.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=edutrack-release-key.jks
          EOF

      - name: Check signing files
        run: |
          test -f android/app/edutrack-release-key.jks
          test -f android/key.properties
          echo "Keystore and key.properties created."

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze Flutter project
        run: flutter analyze

      - name: Build signed release APK
        run: flutter build apk --release

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Upload signed APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: edutrack-signed-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload release AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: edutrack-release-aab
          path: build/app/outputs/bundle/release/app-release.aab

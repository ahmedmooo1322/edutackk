name: Build EduTrack APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create Flutter project
        run: |
          flutter create edutrack_app
          cp -r app_src/* edutrack_app/

      - name: Get dependencies
        working-directory: edutrack_app
        run: flutter pub get

      - name: Analyze
        working-directory: edutrack_app
        run: flutter analyze

      - name: Build debug APK
        working-directory: edutrack_app
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: edutrack-debug-apk
          path: edutrack_app/build/app/outputs/flutter-apk/app-debug.apk
